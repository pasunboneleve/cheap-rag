content_root: ./content
runtime_root: ./.chatbot
runtime:
  socket_path: ./.chatbot/cheap-rag.sock
internal_token: ""
generation_provider: gemini
embedding_provider: gemini
model: gemini-2.0-flash
generation_temperature: 0.5
embedding_model: gemini-embedding-001
citation_pattern: "{chunk_id}"
responses:
  refusal:
    no_retrieval: "Sorry, I don't know how to answer this."
    low_similarity: "Sorry, I don't know how to answer this."
retrieval:
  top_k: 5
  min_query_similarity: 0.45
validation:
  min_evidence_coverage: 0.55
