name: macOS release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    uses: ./.github/workflows/release-reusable.yml
    with:
      runner: macos-14
      goos: darwin
      goarch: arm64
      binary_name: cheap-rag
      archive_name: cheap-rag-darwin-arm64.tar.gz
      publish_release_notes: false
