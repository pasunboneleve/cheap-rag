name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Validate changelog has tag section
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          if ! grep -q "^## \[$version\] - " CHANGELOG.md; then
            echo "changelog missing section for version $version" >&2
            exit 1
          fi

      - name: Extract release notes from changelog
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/release-notes-from-changelog.sh "${GITHUB_REF_NAME#v}" "${GITHUB_REPOSITORY}" > release-notes.md

      - name: Create or update release body
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if gh release view "$tag" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release edit "$tag" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "$tag" \
              --notes-file release-notes.md
          else
            gh release create "$tag" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "$tag" \
              --notes-file release-notes.md

  linux-release:
    needs: create-release
    uses: ./.github/workflows/release-reusable.yml
    with:
      runner: ubuntu-latest
      goos: linux
      goarch: amd64
      binary_name: cheaprag
      archive_name: cheaprag-linux-amd64.tar.gz

  macos-release:
    needs: create-release
    uses: ./.github/workflows/release-reusable.yml
    with:
      runner: macos-14
      goos: darwin
      goarch: arm64
      binary_name: cheaprag
      archive_name: cheaprag-darwin-arm64.tar.gz
