name: Release reusable

on:
  workflow_call:
    inputs:
      runner:
        required: true
        type: string
      goos:
        required: true
        type: string
      goarch:
        required: true
        type: string
      binary_name:
        required: true
        type: string
      archive_name:
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ${{ inputs.runner }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Validate changelog has tag section
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          if ! grep -q "^## \[$version\] - " CHANGELOG.md; then
            echo "changelog missing section for version $version" >&2
            exit 1
          fi

      - name: Wait for release object
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          # Allow enough time for create-release job queue/runner latency.
          for i in $(seq 1 30); do
            if gh release view "$tag" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
              exit 0
            fi
            sleep 10
          done
          echo "release object not found for ${tag} after waiting" >&2
          exit 1

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build release binary
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          release_version="${GITHUB_REF_NAME#v}"
          GOOS="${{ inputs.goos }}" GOARCH="${{ inputs.goarch }}" CGO_ENABLED=0 \
            go build -ldflags "-X main.version=${release_version}" -o "dist/${{ inputs.binary_name }}" ./cmd/cheaprag

      - name: Package release archive
        shell: bash
        run: |
          set -euo pipefail
          tar -C dist -czf "${{ inputs.archive_name }}" "${{ inputs.binary_name }}"

      - name: Upload release asset
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release upload "${GITHUB_REF_NAME}" "${{ inputs.archive_name }}" \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber
